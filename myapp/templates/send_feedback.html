 {% include 'user_nav.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Feedback</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% block content %}
<br><br><br><br>
    <div class="container mt-5">
        <h2 class="text-center">Send Feedback</h2>
        <form action="send_feedback" method="post">
             {% csrf_token %}
        <table class="table table-striped table-bordered">
              <tbody>
                <tr>

                    <td>Enter Details</td>
                    <td><textarea name="feedback" rows="5" cols="17" required></textarea> </td>

                </tr>
               <tr>

                    <td></td>
                    <td><input type="submit" value="Submit" style="background-color: #4CAF50; color: white; border: none; padding: 10px 20px; text-align: center; text-decoration: none; display: inline-block; font-size: 16px; margin: 4px 2px; cursor: pointer; border-radius: 4px;">
</td>

                </tr>

            </tbody>
        </table>
            </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>{% endblock %}

<form id="cancelForm" method="POST" action="{% url 'cancel_order' id=0 %}" style="display: none;">
    {% csrf_token %}
</form>

<script>
    function confirmCancel(id) {
        if (confirm("Are you sure you want to cancel this order?")) {
            const form = document.getElementById('cancelForm');
            form.action = `/cancel_order/${id}`;  // Update form action dynamically
            form.submit();  // Submit the form
        }
    }
</script>
