<html lang="en">
<head>
    <meta charset="UTF-8">

    <title></title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }
        .card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px;
            width: 23%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .card h3 {
            margin: 15px 0;
            font-size: 1.2em;
        }
        .card p {
            margin: 10px 20px;
            font-size: 0.9em;
            color: #555;
        }
        .card button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 20px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .card button:hover {
            background-color: aqua;
        }
        @media screen and (max-width: 768px) {
            .card {
                width: 48%;
            }
        }
        @media screen and (max-width: 480px) {
            .card {
                width: 100%;
            }
        }
        /* Custom navbar color */
        .navbar-custom {
            background-color: #343a40; /* Dark gray background */
            color: white; /* White text color */
        }
        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link {
            color: white;
        }
        .navbar-custom .nav-link:hover {
            color: #ffc107; /* Yellow hover color */
        }
        /* Custom footer color */
        footer {
            background-color: #212529; /* Dark color for footer */
            color: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        footer a {
            color: #ffc107; /* Link color in footer */
        }
        footer a:hover {
            color: #fff; /* Link hover color in footer */
        }
    </style>
</head>
<body>

   <br><br><br>

        <h1>Selected dress images </h1>
    </div>

    <div class="container">

            <h3>Neck </h3>

        </div>

         <div class="card">
            <img src="{{ request.session.sleeve_image }}" alt="parts Image ">
            <h3>Sleeve </h3>
           <h5> <p>Design    </p></h5>
            <b> <button><a href="/view_part_user" style="color: white;">CHANGE</a> </button></b>
        </div>

    </div>
    <div align="center">

            <b> <button><a href="/view_category_user" style="color: white;">CHANGE</a> </button></b>
