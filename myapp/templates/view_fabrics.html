 {% include 'admin_header_two.html' %}


<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bootstrap Table</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% block content %}
<br><br><br><br>
    <div class="container mt-5">
        <h2 class="text-center">View Fabrics</h2>
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <!--<th scope="col">Id</th>-->
                    <th scope="col">Sl No</th>
                    <th scope="col">Category</th>
                    <th scope="col">Fabrics Name</th>
                    <th scope="col">Price Meter</th>

                    <th scope="col">Image Url</th>

                    <th scope="col">EDIT </th>


                </tr>
            </thead>

            <tbody>
                {% for result in data %}
                <tr>
                    <td>{{forloop.counter }}</td>
                    <td>{{ result.5 }}</td>
                    <td>{{ result.2 }}</td>
                    <td>{{ result.3 }}</td>
                    <td><img src="{{ result.4 }}" width="90" height="95"></td>


                    <td><a href="../edit_fabrics/{{ result.0 }}" class="btn btn-warning btn-sm">EDIT </a></td>


                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>{% endblock %}
