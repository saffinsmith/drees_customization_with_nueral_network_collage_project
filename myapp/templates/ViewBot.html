 {% include 'user_nav.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot:Recurrent Neural Network</title>

    <style>
       body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.chatbot-container {
    width: 300px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    overflow: hidden;
}

.chat-header {
    background-color: #007bff;
    color: #fff;
    padding: 10px;
    text-align: center;
    font-size: 18px;
}

.chat-body {
    height: 300px;
    overflow-y: auto;
    padding: 10px;
    border-top: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
}

.bot-message, .user-message {
    margin: 5px 0;
    padding: 8px;
    border-radius: 5px;
}

.bot-message {
    background-color: #e9ecef;
    text-align: left;
}

.user-message {
    background-color: #007bff;
    color: #fff;
    text-align: right;
}

.chat-footer {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

#user-input {
    flex: 1;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
}

button {
    background-color: #007bff;
    color: #fff;
    border: none;
    padding: 8px 12px;
    margin-left: 5px;
    border-radius: 4px;
    cursor: pointer;
}

    </style>
        <script>
        function sendMessage() {
    const userInput = document.getElementById('user-input');
    const chatBody = document.getElementById('chat-body');

    if (userInput.value.trim() !== "") {
        // Add user message to the chat body
        const userMessage = document.createElement('div');
        userMessage.className = 'user-message';
        userMessage.textContent = userInput.value;
        chatBody.appendChild(userMessage);

        // Send input to the Django backend
        fetch('/chatbot/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(), // Include CSRF token for security
            },
            body: JSON.stringify({ user_input: userInput.value }),
        })
        .then(response => response.json())
        .then(data => {
            // Add bot response to the chat body
            const botMessage = document.createElement('div');
            botMessage.className = 'bot-message';
            botMessage.textContent = data.generated_answer; // Assuming the backend returns JSON
            chatBody.appendChild(botMessage);

            // Scroll to the bottom
            chatBody.scrollTop = chatBody.scrollHeight;
        })
        .catch(error => {
            console.error("Error:", error);
        });

        // Clear the input field
        userInput.value = "";
    }
}

// Utility function to get CSRF token from cookies
function getCSRFToken() {
    let cookieValue = null;
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.startsWith('csrftoken=')) {
            cookieValue = cookie.substring('csrftoken='.length);
            break;
        }
    }
    return cookieValue;
}


        </script>
</head>
<body>

    <div class="chatbot-container">
        <div class="chat-header">Personal Fashion Adviser using Recurrent Neural Networks</div>
        <div class="chat-body" id="chat-body">
    <div class="bot-message">{{ data }}</div>
</div>

        <div class="chat-footer">
            <input type="text" name="user-input" id="user-input" placeholder="Type your message here...">
            <button onclick="sendMessage()">Send</button>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
