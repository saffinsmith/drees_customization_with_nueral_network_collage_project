 {% include 'admin_navigation.html' %}


<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            flex: 1;
        }
        footer {
            background-color: #343a40;
            color: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        footer a {
            color: #ffc107;
        }
        footer a:hover {
            color: #fff;
        }
    </style>
</head>
<body>{% block content %}
<br><br><br><br>


<div class="wrapper">
    <!-- Navbar -->
    <nav class="navbar navbar-expand navbar-light bg-light">
        <div class="container-sm">
            <a class="navbar-brand" href="#"> Amount Details</a>
            <div class="navcontent">

            </div>
        </div>
    </nav>
    <!-- Main Content -->
    <div class="content">
        <div class="container w-50 border mt-5" id="form">
            <form class="mt-5" action="/price_details" method="POST">
                {% csrf_token %}


  <!-- <div class="mb-3">
                    <label for="idprice_details" class="form-label"> Price Details ID</label>
                    <input type="text" name="idprice_details" class="form-control" id="idprice_details" required>
                </div>
-->

              <div class="mb-3">
                            <div>Turf Register No :{{ turf_register_no }}</div>

                    <input type="hidden" class="form-control" id="turf_register_no" name="turf_register_no" value="{{ turf_register_no }}" required>
                </div>





                 <div class="mb-3">
                    <label for="price" class="form-label"> Price</label>
                    <input type="text" name="price" class="form-control" id="price" required>
                </div>


                <div class="mb-3">
                    <label for="description" class="form-label"> Description</label>
                    <input type="text" name="description" class="form-control" id="description" required>
                </div>



                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">ADD</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Footer -->

</div>

<script src="scripts.js"></script>
</body>
{% endblock %}

</html>
