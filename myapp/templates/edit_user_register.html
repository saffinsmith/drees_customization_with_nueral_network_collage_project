
{% include 'user_design.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
   <nav class="navbar navbar-expand navbar-light bg-light">

      <br>
       <br><div class="container-sm">

          <a class="navbar-brand" href="#">Edit User Register</a>
          <div class="navcontent">

        </div>
     </div>
      </nav>

<div class="container w-50 border mt-5 " id="form">
      <form class="mt-5" method="POST" action="/update_user_register">
          {% csrf_token %}
        <div class="mb-3">
         <!-- <label for="user_id" class="form-label">User ID</label>---------->
       <input type="text" class="form-control" id="user_id" name="user_id" aria-describedby="" value="{{ data.0.0 }}">

        </div>

        <div class="mb-3">
          <label for="name" class="form-label"> Name</label>
          <input type="text" class="form-control" id="name"  name="name" required value="{{ data.0.1}}">
        </div>



        <div class="mb-3">
          <label class="form-label" for="address">Address</label>
          <input type="text" class="form-control" id="address" name="address" required value="{{ data.0.2 }} ">
        </div>

<div class="mb-3">
          <label class="form-label" for="contact">Contact</label>
          <input type="text" class="form-control" id="contact"  name="contact" required value="{{ data.0.3 }}">
        </div>

<div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="text" class="form-control" id="email"  name="email" required value="{{ data.0.4 }}">
        </div>
<div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="text" class="form-control" id="password"  name="password" required value="{{ data.0.5 }}">
        </div>



        <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">Save </button>
        </div>
      </form>
  </div>
<script src="scripts.js"></script>

</body>

{% endblock %}

</html>
