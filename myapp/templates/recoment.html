    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; /* Adds spacing between cards */
            padding: 20px;
        }
        .card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
       .card img {
    width: 100%; /* Full width of the card */
    height: 100%; /* Full height of the card */
    object-fit: cover; /* Ensures the image covers the entire area without distortion */
    border-top-left-radius: 8px; /* Keeps the border-radius for a rounded look */
    border-top-right-radius: 8px; /* Keeps the border-radius for a rounded look */
}

        .card h3 {
            margin: 15px 0;
            font-size: 1.2em;
        }
        .card p {
            margin: 10px 20px;
            font-size: 0.9em;
            color: #555;
        }
        .card button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 20px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        @media screen and (max-width: 768px) {
            .card {
                width: 48%;
            }
        }
        @media screen and (max-width: 480px) {
            .card {
                width: 100%;
            }
        }
        /* Custom navbar color */
        .navbar-custom {
            background-color: #343a40; /* Dark gray background */
            color: white; /* White text color */
        }
        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link {
            color: white;
        }
        .navbar-custom .nav-link:hover {

        /* Custom footer color */
        footer {
            background-color: #212529; /* Dark color for footer */
            color: white;
            padding: 20px;
            text-align: center;

        }
        footer a {
            color: #ffc107; /* Link color in footer */
        }
        footer a:hover {
            color: #fff; /* Link hover color in footer */
        }
    </style>
