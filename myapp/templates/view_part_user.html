 {% include 'user_nav.html' %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bootstrap Table</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% block content %}
<br><br><br><br>
    <div class="container mt-5">
        <h2 class="text-center">View Types</h2>
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <!--<th scope="col">Id</th>-->
                    <th scope="col">Sl No</th>
                    <th scope="col">Name</th>
                    <th scope="col"> </th>
                    <th scope="col"> </th>
                    <th scope="col"> </th>
                </tr>
            </thead>

            <tbody>
                {% for result in data %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ result.1 }}</td>
                    <td><img src="{{ result.3 }}">  </td>
                    <td><a href="view_parts_image_user/{{ result.0 }}/Neck" class="btn btn-warning btn-sm">NECK DESIGN</a></td>
                    <td><a href="view_parts_image_user/{{ result.0 }}/Sleeve" class="btn btn-info btn-sm">SLEEVE DESIGN</a></td>


                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>{% endblock %}
