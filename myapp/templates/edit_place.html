
{% include 'admin_navigation.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
   <nav class="navbar navbar-expand navbar-light bg-light">

       <br><div class="container-sm">

          <a class="navbar-brand" href="#">Edit Place</a>
          <div class="navcontent">

        </div>
     </div>
      </nav>

<div class="container w-50 border mt-5 " id="form">
      <form class="mt-5" method="POST" action="/update_place">
          {% csrf_token %}
        <div class="mb-3">
          <label for="place_id" class="form-label">Place ID</label>
       <input type="text" class="form-control" id="place_id" name="place_id" aria-describedby="" value="{{ data.0.0 }}">

        </div>

        <div class="mb-3">
          <label for="district_id" class="form-label">District ID</label>
          <input type="text" class="form-control" id="district_id"  name="district_id" required value="{{ data.0.1}}">
        </div>



        <div class="mb-3">
          <label class="form-label" for="place_name">Name of Place</label>
          <input type="text" class="form-control" id="place_name" name="place_name" required value="{{ data.0.2 }} ">
        </div>

<div class="mb-3">
          <label class="form-label" for="city">Name of City</label>
          <input type="text" class="form-control" id="city"  name="city" required value="{{ data.0.3 }}">
        </div>

        <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">Save </button>
        </div>
      </form>
  </div>
<script src="scripts.js"></script>

</body>

</html>
