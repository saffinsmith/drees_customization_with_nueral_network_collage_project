{% include 'admin_navigation.html' %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            flex: 1;
        }
        footer {
            background-color: #343a40;
            color: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        footer a {
            color: #ffc107;
        }
        footer a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
<br><br><br>
{% block content %}

<div class="wrapper">
    <!-- Navbar -->
    <nav class="navbar navbar-expand navbar-light bg-light">
        <div class="container-sm">
            <a class="navbar-brand" href="#">Register Place</a>
            <div class="navcontent">

            </div>
        </div>
    </nav>
    <!-- Main Content -->
    <div class="content">
        <div class="container w-50 border mt-5" id="form">
            <form class="mt-5" action="../../add_place" method="POST">
                {% csrf_token %}


              <div class="mb-3">

                    <label for="district_name" class="form-label category-label">District Name : {{ name }}</label>
                    <input type="hidden" class="form-control" id="district_id" name="district_id" value="{{ district_id }}" required>
                </div>

                                <div class="mb-3">
                                    <label for="place_name" class="form-label"> Name of Place</label>
                    <input type="text" name="place_name" class="form-control" id="place_name" required>
                </div>
                <br>
                <div class="mb-3">
                    <label for="city" class="form-label"> Name of city</label>
                    <input type="text" name="city" class="form-control" id="city" required>
                </div>


                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">Add</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Footer -->
    <footer>
        {% include 'adminfooter.html' %}
    </footer>
</div>

<script src="scripts.js"></script>
</body>
{% endblock %}

</html>
