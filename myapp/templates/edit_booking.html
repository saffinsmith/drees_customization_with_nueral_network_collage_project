
{% include 'navbar.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
   <nav class="navbar navbar-expand navbar-light bg-light">

       <br><div class="container-sm">

          <a class="navbar-brand" href="#">Edit Booking</a>
          <div class="navcontent">

        </div>
     </div>
      </nav>

<div class="container w-50 border mt-5 " id="form">
      <form class="mt-5" method="POST" action="/update_booking">
          {% csrf_token %}

        <!---turf number-->
           <div class="mb-3">
          <label for="idbooking" class="form-label">Booking ID:</label>
       <input type="text" class="form-control" id="idbooking" name="idbooking" aria-describedby="" value="{{ data.0.0 }}">

        </div>
          <!--------user ID-------->
          <div class="mb-3">
          <label for="user_id" class="form-label">User ID</label>
       <input type="text" class="form-control" id="user_id" name="user_id" aria-describedby="" value="{{ data.0.1 }}">

        </div>

          <!--------Turf regster ID-------->


        <div class="mb-3">
          <label for="turf_register_no" class="form-label">Turf Register No</label>
          <input type="text" class="form-control" id="turf_register_no"  name="turf_register_no" required value="{{ data.0.2}}">
        </div>

          <!--------Date of booking-------->

        <div class="mb-3">
          <label class="form-label" for="book_date">Date of Booking</label>
          <input type="date" class="form-control" id="book_date" name="book_date" required value="{{ data.0.3 }} ">
        </div>
<!-------hour------>

<div class="mb-3">
          <label class="form-label" for="hour">Hour</label>
          <input type="text" class="form-control" id="hour"  name="hour" required value="{{ data.0.4 }}">
        </div>

<!----------status------------->
       <div class="mb-3">
          <label class="form-label" for="status">Status</label>
          <input type="text" class="form-control" id="status"  name="status" required value="{{ data.0.5 }}">
        </div>



        <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">Save </button>
        </div>
      </form>
  </div>
<script src="scripts.js"></script>

</body>
<footer>
    {% include 'adminfooter.html' %}
</footer>

</html>
