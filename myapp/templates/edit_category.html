
{% include 'admin_navigation.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
   <nav class="navbar navbar-expand navbar-light bg-light">

       <br><div class="container-sm">

          <a class="navbar-brand" href="#">Edit Category</a>
          <div class="navcontent">

        </div>
     </div>
      </nav>

<div class="container w-50 border mt-5 " id="form">
      <form class="mt-5" method="POST" action="/update_category">
          {% csrf_token %}
        <div class="mb-3">
          <label for="category_id" class="form-label">Category ID</label>
       <input type="text" class="form-control" id="category_id" name="category_id" readonly aria-describedby="" value="{{ data.0.0 }}">

        </div>

      <div class="mb-3">
          <label for="name" class="form-label">Category Name</label>
          <input type="text" name="name" class="form-control" id="name" required placeholder="Enter category item" value="{{ data.0.1 }}">
        </div>
        <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">Save </button>
        </div>
      </form>
  </div>
<script src="scripts.js"></script>

</body>

</html>
