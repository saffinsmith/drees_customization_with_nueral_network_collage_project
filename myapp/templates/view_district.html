 {% include 'admin_navigation.html' %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bootstrap Table</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f4f9;
        }
        .container {
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 2em;
            color: #343a40;
        }
        table {
            background: #ffffff;
        }
        .btn-warning {
            background-color: #ffc107;
            border-color: #ffc107;
            color: #343a40;
        }
        .btn-warning:hover {
            background-color: #e0a800;
            border-color: #d39e00;
            color: #ffffff;
        }
        .thead-dark {
            background-color: #343a40;
            color: white;
        }
        footer {
            background-color: #343a40;
            color: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        footer a {
            color: #ffc107;
        }
        footer a:hover {
            color: #fff;
        }
    </style>
</head>

{% block content %}
<body>
  <br><br><br>  <div class="container mt-5">
        <h2 class="text-center">View District</h2>
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th scope="col">Id</th>
                    <th scope="col">District Name</th>
                    <th scope="col">ADD PLACE</th>
                    <th scope="col">VIEW PLACE</th>
                </tr>
            </thead>
            <tbody>
                {% for result in data %}
                <tr>
                    <td>{{ result.0 }}</td>
                    <td>{{ result.1 }}</td>
                    <td><a href="add_place_link/{{ result.0 }}/{{ result.1 }}" class="btn btn-warning btn-sm">ADD </a></td>
                    <td><a href="view_place" class="btn btn-warning btn-sm">VIEW  </a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
 {% endblock %}
