<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }

        /* Content */
        .content {
            margin-left: 230px;
            padding: 20px;
        }

        /* Cards */
        .card-box {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Navbar */
        .navbar {
            margin-left: 220px;
        }
    </style>
</head>

<body>


<div class="sidebar">
    <h4 class="text-center">Admin</h4>
    <a href="#"><i class="fa fa-home"></i> Dashboard</a>
    <a href="add_category_expert_link"><i class="fa fa-plus"></i> Add Category</a>
    <a href="view_category_expert"><i class="fa fa-list"></i> View Category</a>
    <a href="expert_view_suggestion"><i class="fa fa-lightbulb"></i> Suggestions</a>
      <a href="expert_view_order"><i class="fa fa-lightbulb"></i> View Order</a>
    <a href="logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <h5 class="ms-3">Dashboard</h5>
    </div>
</nav>

<!-- Main Content -->
<div class="content">
    <div class="container">

        <h3 class="mb-4">Welcome Expert </h3>

        <div class="row g-4">

            <!-- Add Category -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow card-box">
                    <div class="icon text-primary">
                        <i class="fa fa-plus-circle"></i>
                    </div>
                    <h5>Add Category</h5>
                    <a href="add_category_expert_link" class="btn btn-primary mt-2">Open</a>
                </div>
            </div>

            <!-- View Category -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow card-box">
                    <div class="icon text-success">
                        <i class="fa fa-list"></i>
                    </div>
                    <h5>View Category</h5>
                    <a href="view_category_expert" class="btn btn-success mt-2">Open</a>
                </div>
            </div>

            <!-- View Suggestion -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow card-box">
                    <div class="icon text-warning">
                        <i class="fa fa-lightbulb"></i>
                    </div>
                    <h5>View Suggestion</h5>
                    <a href="expert_view_suggestion" class="btn btn-warning mt-2">Open</a>
                </div>
            </div>

            <!-- Logout -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow card-box">
                    <div class="icon text-danger">
                        <i class="fa fa-sign-out-alt"></i>
                    </div>
                    <h5>Logout</h5>
                    <a href="/logout" class="btn btn-danger mt-2"
                       onclick="return confirm('Are you sure you want to logout?')">Exit</a>
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
