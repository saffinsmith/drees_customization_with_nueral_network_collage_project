{% include 'admin_navigation.html' %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/3da5cff3a5.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            flex: 1;
        }
        footer {
            background-color: #343a40;
            color: white;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        footer a {
            color: #ffc107;
        }
        footer a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
<br><br><br>
{% block content %}

<div class="wrapper">
    <!-- Navbar -->
    <nav class="navbar navbar-expand navbar-light bg-light">
        <div class="container-sm">
            <a class="navbar-brand" href="#">Upload Parts Image</a>
            <div class="navcontent">

            </div>
        </div>
    </nav>
    <!-- Main Content -->
    <div class="content">
        <div class="container w-50 border mt-5" id="form">
           <form class="mt-5" action="/add_parts_image" method="POST">
           <!-- <form class="mt-5" id="form1" name="form1" method="post" enctype="multipart/form-data">-->

                {% csrf_token %}

                   <div class="mb-3">
          <label for="shirt_parts_id" class="form-label">Shirt Parts ID:{{ shirt_parts_id }}</label>
          <input type="hidden" name="shirt_parts_id" class="form-control" id="shirt_parts_id" required>
        </div>

                <div class="mb-3">

          <label for="file_path" class="form-label">File Path</label>
          <input type="text" name="file_path" class="form-control" id="file_path" required placeholder="Enter File Path">
        </div>

                <div class="mb-3">

          <label for="component_name" class="form-label"> Component Name</label>
          <input type="text" name="component_name" class="form-control" id="component_name" required placeholder="Enter componenet Name">
        </div>

                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-success text-white btn-outline-success form-control w-50 m-3" id="ekleButton">Add</button>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="scripts.js"></script>
</body>
{% endblock %}

</html>
