{% include 'admin_navigation.html' %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px auto;
            font-size: 18px;
            font-family: Arial, sans-serif;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }
        th {
            background-color: #f4a261;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #fce4d6;
        }
        caption {
            font-size: 20px;
            margin-bottom: 10px;
            color: #264653;
            font-weight: bold;
        }
    </style>
    <style>
    input[type="text"] {
        width: 90%;
        padding: 8px;
        margin: 5px 0;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    input[type="text"]:focus {
        border-color: #f4a261;
        outline: none;
        box-shadow: 0 0 5px rgba(244, 162, 97, 0.5);
    }

    input[type="submit"] {
        background-color: #f4a261;
        color: white;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        padding: 10px 20px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
        background-color: #e76f51;
    }
</style>

</head>
<body>
<br/>
<br/>
 <h3>User Measurements</h3>
<form action="add_measurements" method="post">
    {% csrf_token %}
    <table>
        <caption>User Measurements</caption>
        <thead>
        <tr>
                <th>Types</th>
                <th>Values</th>
            </tr>

        </thead>
        <tbody>
             <tr>
                <td>Waist</td>
                <td><input type="text" name="waist" readonly value="{{ data.2 }}"  /> </td>
            </tr>
            <tr>
                <td>Hip</td>
                <td><input type="text" name="Hip" readonly value= {{ data.3 }} /> </td>
            </tr>
             <tr>
                <td>Length</td>
                <td><input type="text" name="Length" readonly  value= {{ data.4 }}> </td>
            </tr>
            <tr>
                <td>Shoulder full length</td>
                <td><input type="text" name="shoulder_full_length" readonly  value= {{ data.5 }}> </td>
            </tr>
           <tr>
                <td>Arm around</td>
                <td><input type="text" name="arm_around" readonly  value={{ data.6 }}> </td>
            </tr>
             <tr>
                <td>Front neck depth</td>
                <td><input type="text" name="front_neck_depth" readonly  value= {{ data.7 }}> </td>
            </tr>
            <tr>
                <td>Sleeve length</td>
                <td><input type="text" name="sleev_length" readonly  value= {{ data.8 }} /> </td>
            </tr>
           <tr>
                <td>Sleeve opening</td>
                <td><input type="text" name="sleev_opening" readonly  value= {{ data.9 }} /> </td>
            </tr>
           <tr>
                <td>Shoulder</td>
                <td><input type="text" name="shoulder" readonly  value= {{ data.10 }} /> </td>
            </tr>
               <tr>
                <td>Back neck depth</td>
                <td><input type="text" name="back_neck_depth" readonly  value= {{ data.11 }} /> </td>
            </tr>
                <tr>
                <td>Blouse Length</td>
                <td><input type="text" name="blowse_length" readonly  value= {{ data.12 }} /> </td>
            </tr>
        <tr>
                <td> </td>
            <td>
          <a href="admin_home" class="btn btn-warning btn-sm">Back</a>
 </td>
            </tr>
        </tbody>
    </table>
</form>
</body>
</html>
