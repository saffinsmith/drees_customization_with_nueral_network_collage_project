<head>
    <style>
        body{
  background-color:#000;
}
#top-head{
  width: 100%;  /* nav bar lemgth incrment chyn right ilo*/
  border-radius:30px;
  height: 60px;
  background: #F28585;
  display: flex;
  position: fixed;
  z-index: 999;
}
#top-head .inner {
  float: left;
  width: 90%;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
/*logo style*/
.inner h1 a {
  color: #20b2aa;
  text-decoration: none;
  font-weight: bold;
}
/*nav style*/
#top-head nav ul {
  display: flex;
  list-style-type: none;
}
/*nav link style*/
#top-head nav ul li a {
  text-decoration: none;
  padding: 5px;
  color: #404040;
}
#top-head nav ul li a:hover {
  color: #fff;
}
#nav_toggle {
  display: none;
}

/*============================
mobile style
============================*/
@media screen and (max-width:680px) {
/*hamburger menu style*/
  #nav_toggle {
    display: block;
    width: 30px;
    height: 20px;
    position: relative;
    top: 4px;
    z-index: 100;
  }
  #nav_toggle div {
    position: relative;
  }
/*hamburger menu close style*/
  #nav_toggle span {
    display: block;
    height: 2px;
    background: blue;
    position:absolute;
    width: 80%;
    left: 0;
    -webkit-transition: 0.5s ease-in-out;
    -moz-transition: 0.5s ease-in-out;
    transition: 0.5s ease-in-out;
  }
  #nav_toggle span:nth-child(1) {
    top:0px;
  }
  #nav_toggle span:nth-child(2) {
    top:10px;
  }
  #nav_toggle span:nth-child(3) {
    top:20px;
  }
/*hamburger menu open style*/
  .open #nav_toggle span:nth-child(1) {
    top: 10px;
    -webkit-transform: rotate(135deg);
    -moz-transform: rotate(135deg);
    transform: rotate(135deg);
  }
  .open #nav_toggle span:nth-child(2) {
    width: 0;
    left: 50%;
  }
  .open #nav_toggle span:nth-child(3) {
    top: 10px;
    -webkit-transform: rotate(-135deg);
    -moz-transform: rotate(-135deg);
    transform: rotate(-135deg);
  }
/*nav style*/
  #top-head nav {
    display: none;
    position: absolute;
    top: 30px;
    left: 0;
    width: 60%;
    height: 90px;
    background: #ffffff;
    z-index: 999;
  }
  #top-head nav ul {
    display: block;
    width: 50%;
  }
  #top-head nav ul li {
    text-align: center;
    border-bottom: 1px solid #dcdcdc;
  }
  #top-head nav ul li:last-child {
    border: none;
  }
/*nav link style*/
  #top-head nav ul li a {
    display: block;
  }
}
@media screen and (min-width: 681px) {
  #top-head nav {
    display: block; /* 680px以上の場合は常に表示 */
    position: static;
    height: auto;
    background: none;
  }
  #top-head nav ul {
    display: flex;

  }
}
    </style>
</head>

  <header id="top-head">
    <div class="inner">
      <h1><a href="#">WELCOME</a></h1>
      <div id="nav_toggle">
        <div>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <nav>
        <ul>
          <li><a href="/">HOME</a></li>

          <li><a href="login_link">LOGIN </a></li>
        </ul>
      </nav>
    </div>
  </header>
